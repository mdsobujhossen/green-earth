<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>green-earth</title>


    <!-- tailwind and daisy ui cdn -->
    <link href="https://cdn.jsdelivr.net/npm/daisyui@5" rel="stylesheet" type="text/css" />
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
</head>

<body class="bg-base-300">
    <main>
        <h2 class="text-3xl font-semibold text-center">Choose your trees</h2>
        <section class="grid grid-cols-5 gap-5 container max-w-11/12 mx-auto mt-10">
            <!-- categories section -->
            <section class="bg-base-100 rounded-lg shadow-md p-5 ">
                <h3 class="text-2xl font-bold text-center mb-3">Categories</h3>
                <div id="categories-btn-container" class="grid grid-cols-1 gap-3">
                    <button class="btn btn-outline btn-success">All trees</button>
                </div>
            </section>

            <!-- trees section -->
            <section class="bg-base-100 rounded-lg shadow-md col-span-3 p-5">
                <div id="trees-container" class="grid grid-cols-1 md:grid-cols-3 gap-4 ">
                    <div class="card bg-base-100 shadow-lg p-3">
                        <figure class="">
                            <img class="h-38 object-cover rounded-sm" src="https://img.daisyui.com/images/stock/photo-1606107557195-0e29a4b5b4aa.webp"
                                alt="Shoes" class="rounded-xl" />
                        </figure>
                        <div class="space-y-2 mt-5 items-center text-center">
                            <h2 class="card-title">Card Title</h2>
                            <p class="line-clamp-2 text-left">A card component has a figure, a body part, and inside body there
                                are title and actions
                                parts</p>
                            <div class="flex justify-between items-center">
                                <div class="badge badge-soft badge-success">Success</div>
                                <p class="text-xl font-semibold">$500</p>
                            </div>
                            <div class="card-actions w-full">
                                <button class="btn btn-success w-12/12 ">Buy Now</button>
                            </div>
                        </div>
                    </div>
                </div>
            </section>


            <!-- cart section -->
            <section class="bg-base-100 rounded-lg shadow-md p-5">
                <h3 class="text-2xl font-bold text-center">cart</h3>
            </section>
        </section>
    </main>


    <script src="./script/index.js"></script>
</body>

</html>
