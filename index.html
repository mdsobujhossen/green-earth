<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>green-earth</title>


    <!-- tailwind and daisy ui cdn -->
    <link href="https://cdn.jsdelivr.net/npm/daisyui@5" rel="stylesheet" type="text/css" />
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
</head>

<body class="bg-base-300">
    <main>
        <h2 class="text-3xl font-semibold text-center">Choose your trees</h2>
        <section class="grid grid-cols-5 gap-5 container max-w-11/12 mx-auto mt-10">
            <!-- categories section -->
            <section class="bg-base-100 rounded-lg shadow-md p-5 space-y-3">
                <h3 class="text-2xl font-bold text-center mb-3">Categories</h3>

                <button id="all-trees-btn" class="btn  btn-success w-full">All trees</button>
                <div id="categories-btn-container" class="grid grid-cols-1 gap-3">

                </div>
            </section>

            <!-- trees section -->
            <section class="bg-base-100 rounded-lg shadow-md col-span-3 p-5">
                <!-- trees container -->
                <div id="trees-container" class="grid grid-cols-1 md:grid-cols-3 gap-4 ">
                </div>


                <!-- loading container -->
                <div id="loading-spinner" class="hidden h-[60vh] justify-center items-center">
                    <span class="loading loading-spinner loading-xl"></span>
                </div>
            </section>


            <!-- cart section -->
            <section class="bg-base-100 rounded-lg shadow-md p-5 space-y-5">
                <h3 class="text-2xl font-bold text-center">cart</h3>

                <div class="space-y-4">
                    <div id="cartContainer" class="space-y-4">
                        <div class="card card-body bg-slate-100">
                            <div class="flex justify-between items-center">
                                <div>
                                    <h2>Name</h2>
                                    <p> $2000 × 10</p>
                                </div>
                                <button class="btn btn-ghost">X</button>
                            </div>
                            <p class="text-right font-semibold text-xl">$500</p>
                        </div>
                    </div>

                    <div id="emptyCartMessage" class="text-center py-4">
                        <p>Your cart is empty</p>
                        <p>Add trees to get started</p>
                    </div>


                    <!-- Total amount -->
                    <div class="flex justify-between items-center bg-green-50 rounded-lg p-4 my-3 font-bold">
                        <span>Total:</span>
                        <span id="totalPrice">$0</span>
                    </div>

                </div>

            </section>
        </section>

        <!-- product details modal -->
        <!-- Open the modal using ID.showModal() method -->
        <button class="btn" onclick="tree_details_modal.showModal()">open modal</button>
        <dialog id="tree_details_modal" class="modal modal-bottom sm:modal-middle">
            <div class="modal-box">

                <div>
                    <button class="btn btn-sm btn-circle btn-ghost absolute right-2 top-2"
                        ondblclick="document.getElementById('tree_details_modal').close()">✕</button>
                    <figure class="">
                        <img id="modal-image" class="h-38 object-cover rounded-sm" src="assets/hero-leaf2.png"
                            alt="Shoes" class="rounded-xl" />
                    </figure>
                    <div class="space-y-2 mt-5 items-center text-center">
                        <h2 id="modal-title" class="card-title">Lorem ipsum dolor sit amet.</h2>
                        <p id="modal-description" class="line-clamp-2 text-left">Lorem ipsum dolor sit amet, consectetur
                            adipisicing elit. Eaque doloribus commodi aspernatur.</p>
                        <div class="flex justify-between items-center">
                            <span id="modal-badge" class="badge badge-soft badge-success">lorem</span>
                            <p class="text-xl font-semibold">$<span id="modal-price">500</span></p>
                        </div>
                        <div class="card-actions w-full">
                            <button class="btn btn-success w-12/12 ">Add to card</button>
                        </div>
                    </div>

                </div>


                <div class="modal-action">
                    <form method="dialog">
                        <!-- if there is a button in form, it will close the modal -->
                        <button class="btn">Close</button>
                    </form>
                </div>
            </div>
        </dialog>
    </main>


    <script src="./script/index.js"></script>
</body>

</html>
